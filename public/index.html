<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Crawler Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.6);
            --border-color: rgba(48, 54, 61, 0.8);
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --star-color: #e3b341;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(88, 166, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(46, 160, 67, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #58a6ff, #79c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Glassmorphism Panel */
        .dashboard-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Stats Row */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Table */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        th {
            text-align: left;
            padding: 12px 20px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 20px;
            background: rgba(255,255,255,0.02);
            transition: background 0.2s ease;
        }

        tr td:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        tr td:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

        tr:hover td {
            background: rgba(255,255,255,0.06);
        }

        .repo-name {
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .repo-owner {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stars-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(227, 179, 65, 0.1);
            color: var(--star-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(227, 179, 65, 0.2);
        }

        /* Loader */
        .loader {
            text-align: center;
            padding: 40px;
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(88, 166, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>GitHub Data Explorer</h1>
            <p class="subtitle">Live database insights from your crawler engine</p>
        </header>

        <div class="dashboard-panel">
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-value" id="top-stars">--</div>
                    <div class="stat-label">Max Stars</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-repos">--</div>
                    <div class="stat-label">Processed Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">Live 🟢</div>
                    <div class="stat-label">Database Status</div>
                </div>
            </div>

            <div id="loader" class="loader">
                <div class="spinner"></div>
                <div>Querying database...</div>
            </div>

            <div class="table-responsive">
                <table id="data-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Repository</th>
                            <th>Owner</th>
                            <th>Stars</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows populated by JS -->
                    </tbody>
                </table>
            </div>

            <div class="pagination-controls" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <button id="prev-btn" onclick="changePage(-1)" style="padding: 8px 16px; background: var(--panel-bg); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; transition: all 0.2s;">&larr; Previous</button>
                
                <span id="page-info" style="color: var(--text-secondary); font-size: 0.9rem;">Page 1 of 1</span>
                
                <button id="next-btn" onclick="changePage(1)" style="padding: 8px 16px; background: var(--accent-color); color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s;">Next &rarr;</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const limit = 50;
        let totalPages = 1;

        async function fetchDashboardData(page = 1) {
            try {
                document.getElementById('data-table').style.opacity = '0.3';
                
                const response = await fetch(`/api/repositories?page=${page}&limit=${limit}`);
                const responseData = await response.json();
                
                const data = responseData.data;
                const pagination = responseData.pagination;
                
                totalPages = pagination.totalPages;
                currentPage = pagination.page;

                document.getElementById('loader').style.display = 'none';
                document.getElementById('data-table').style.display = 'table';
                document.getElementById('data-table').style.opacity = '1';

                // Update Stats
                if(data.length > 0 && page === 1) {
                    document.getElementById('top-stars').innerText = new Intl.NumberFormat('en-US', {
                        notation: "compact", compactDisplay: "short"
                    }).format(data[0].stars);
                }
                document.getElementById('total-repos').innerText = new Intl.NumberFormat().format(pagination.total);
                
                // Update Pagination UI
                document.getElementById('page-info').innerText = `Page ${currentPage} of ${totalPages || 1}`;
                document.getElementById('prev-btn').disabled = currentPage <= 1;
                document.getElementById('prev-btn').style.opacity = currentPage <= 1 ? '0.5' : '1';
                document.getElementById('next-btn').disabled = currentPage >= totalPages;
                document.getElementById('next-btn').style.opacity = currentPage >= totalPages ? '0.5' : '1';

                const tbody = document.getElementById('table-body');
                let html = '';
                
                const startRank = (currentPage - 1) * limit;
                
                data.forEach((repo, index) => {
                    html += `
                        <tr>
                            <td style="color: var(--text-secondary); font-weight: bold;">#${startRank + index + 1}</td>
                            <td>
                                <div class="repo-name">
                                    <svg height="16" viewBox="0 0 16 16" width="16" fill="var(--text-secondary)"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1.5h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.249.249 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"></path></svg>
                                    ${repo.name}
                                </div>
                            </td>
                            <td><span class="repo-owner">@${repo.owner}</span></td>
                            <td>
                                <div class="stars-badge">
                                    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path></svg>
                                    ${new Intl.NumberFormat().format(repo.stars)}
                                </div>
                            </td>
                        </tr>
                    `;
                });
                
                tbody.innerHTML = html;

            } catch (error) {
                console.error("Error fetching data", error);
                document.getElementById('loader').innerText = "Failed to connect to database.";
            }
        }

        function changePage(direction) {
            const newPage = currentPage + direction;
            if (newPage > 0 && newPage <= totalPages) {
                fetchDashboardData(newPage);
                // Scroll to top of table smoothly
                document.querySelector('.dashboard-panel').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Initialize
        fetchDashboardData(1);
    </script>
</body>
</html>
